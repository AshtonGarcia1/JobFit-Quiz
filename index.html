<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobFit Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="quiz-card">
    <p class="label">Career Finder</p>
    <h1>JobFit Quiz</h1>
    <p class="intro">Answer 10 quick questions and see what career areas might fit you best.</p>

    <div class="progress-row">
      <span id="questionNumber">Question 1 of 10</span>
      <span id="percent">0%</span>
    </div>

    <div class="progress-track">
      <div id="progressBar"></div>
    </div>

    <section id="quizArea"></section>

    <button id="nextButton">Next</button>

    <section id="resultArea" class="hidden"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
